services:
  calendar:
    build:
      context: .
      target: dev
    image: ${CALENDAR_IMAGE:-track-binocle/calendar:local}
    command: ["npm", "run", "dev"]
    env_file:
      - path: ./.env.local
        required: false
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      VITE_CALENDAR_BRIDGE_URL: http://localhost:4200
    volumes:
      - ./:/app
      - calendar-node-modules:/app/node_modules
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      calendar-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3003').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 20

  calendar-bridge:
    build:
      context: .
      target: dev
    image: ${CALENDAR_BRIDGE_IMAGE:-track-binocle/calendar-bridge:local}
    command: ["npm", "run", "bridge"]
    env_file:
      - path: ./.env
        required: false
      - path: ../mail/.env
        required: false
      - path: ./.env.local
        required: false
    environment:
      NODE_ENV: development
      CALENDAR_BRIDGE_PORT: 4200
      CALENDAR_APP_ORIGIN: http://localhost:3003
      CALENDAR_BRIDGE_PUBLIC_ORIGIN: http://localhost:4200
      CALENDAR_REDIRECT_URI: http://localhost:4200/auth/google/callback
    volumes:
      - ./:/app
      - calendar-node-modules:/app/node_modules
    ports:
      - "127.0.0.1:4200:4200"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const port=process.env.CALENDAR_BRIDGE_PORT||4200; fetch('http://127.0.0.1:'+port+'/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 12

volumes:
  calendar-node-modules: